<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tap2Earn - Premium Color Gaming App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-wrapper {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: linear-gradient(145deg, #fff5eb 0%, #ffe8f0 100%);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border-radius: 0;
            overflow-x: hidden;
        }

        /* Animations */
        @keyframes floatIn {
            0% { opacity: 0; transform: scale(0.95) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 5px rgba(249,115,22,0.3), 0 0 10px rgba(249,115,22,0.2); }
            50% { box-shadow: 0 0 20px rgba(249,115,22,0.8), 0 0 30px rgba(236,72,153,0.5); }
        }

        @keyframes bounceBtn {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        @keyframes shakeWin {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
            100% { transform: translateX(0); }
        }

        @keyframes ripple {
            0% { transform: scale(0); opacity: 0.5; }
            100% { transform: scale(2); opacity: 0; }
        }

        .btn-effect {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .btn-effect:active {
            transform: scale(0.96);
        }

        .btn-effect::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            transform: translate(-50%, -50%);
            transition: width 0.4s, height 0.4s;
        }

        .btn-effect:active::after {
            width: 200%;
            height: 200%;
        }

        /* Auth Card */
        .auth-card {
            background: rgba(255,255,255,0.98);
            border-radius: 48px;
            margin: 20px 16px;
            overflow: hidden;
            animation: floatIn 0.5s ease-out;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.3);
            border: 1px solid rgba(249,115,22,0.2);
        }

        .header {
            background: linear-gradient(135deg, #ff6a00, #ee0979);
            color: white;
            padding: 32px 20px;
            text-align: center;
            position: relative;
        }

        .header::before {
            content: '✨';
            position: absolute;
            font-size: 60px;
            opacity: 0.2;
            bottom: 10px;
            right: 20px;
            animation: glowPulse 2s infinite;
        }

        .header h2 {
            font-size: 2rem;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .tabs {
            display: flex;
            background: #fff;
            border-bottom: 2px solid #ffe0cc;
        }

        .tab-btn {
            flex: 1;
            padding: 16px;
            border: none;
            background: none;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            color: #64748b;
            position: relative;
        }

        .tab-btn.active {
            color: #f97316;
            background: linear-gradient(180deg, #fff, #fff5f0);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #f97316, #ec489a);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { width: 0; left: 50%; }
            to { width: 100%; left: 0; }
        }

        .form-content {
            padding: 28px 24px;
        }

        .form {
            display: none;
            animation: fadeScale 0.4s ease;
        }

        .form.active {
            display: block;
        }

        @keyframes fadeScale {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1e293b;
            font-size: 0.85rem;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #ffe0cc;
            border-radius: 60px;
            font-size: 0.95rem;
            transition: all 0.3s;
            background: white;
        }

        .input-group input:focus {
            border-color: #f97316;
            outline: none;
            box-shadow: 0 0 0 4px rgba(249,115,22,0.2);
            transform: scale(1.01);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(95deg, #f97316, #ec489a);
            color: white;
            border: none;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 12px;
            animation: glowPulse 2s infinite;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px -8px rgba(249,115,22,0.6);
        }

        .message {
            margin-top: 18px;
            padding: 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            text-align: center;
            display: none;
            font-weight: 500;
        }

        .message.error { background: #fee2e2; color: #dc2626; display: block; border-left: 5px solid #dc2626; animation: shakeWin 0.3s; }
        .message.success { background: #d1fae5; color: #059669; display: block; border-left: 5px solid #059669; }

        /* Dashboard */
        .dashboard {
            background: linear-gradient(145deg, #fff9f5 0%, #fff0f5 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            background: linear-gradient(135deg, #ff6a00, #ee0979);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            position: relative;
        }

        .coin-display {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(12px);
            padding: 8px 24px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.7rem;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: glowPulse 1.5s infinite;
        }

        .action-btn {
            background: rgba(255,255,255,0.25);
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }

        .action-btn:active {
            transform: scale(0.94);
        }

        .main-content {
            flex: 1;
            padding: 20px 16px;
            padding-bottom: 85px;
            overflow-y: auto;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 10px 12px;
            border-top: 1px solid rgba(249,115,22,0.3);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: none;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            color: #64748b;
            font-weight: 600;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .nav-item.active {
            color: #f97316;
            background: linear-gradient(135deg, #fff0e6, #ffe4f0);
            transform: translateY(-3px);
        }

        .nav-icon {
            font-size: 1.8rem;
            transition: transform 0.2s;
        }

        .nav-item:active .nav-icon {
            transform: scale(0.9);
        }

        .content-section {
            display: none;
            animation: fadeScale 0.3s ease;
        }

        .content-section.active {
            display: block;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 22px;
            margin-bottom: 20px;
            box-shadow: 0 12px 25px -10px rgba(0,0,0,0.1);
            transition: all 0.3s;
            border: 1px solid rgba(249,115,22,0.15);
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 35px -12px rgba(249,115,22,0.2);
        }

        .stats-grid {
            display: flex;
            gap: 16px;
            margin-top: 12px;
        }

        .stat-item {
            background: linear-gradient(135deg, #fff5e6, #ffeaf4);
            flex: 1;
            text-align: center;
            padding: 18px;
            border-radius: 28px;
            transition: all 0.2s;
        }

        .stat-item:active {
            transform: scale(0.97);
        }

        /* Game Modal */
        .game-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .game-modal.active {
            display: flex;
            animation: fadeScale 0.25s;
        }

        .game-container {
            background: linear-gradient(145deg, #ffffff, #fff8f0);
            border-radius: 56px;
            width: 92%;
            max-width: 380px;
            overflow: hidden;
            animation: floatIn 0.4s;
            box-shadow: 0 30px 50px rgba(0,0,0,0.4);
        }

        .game-header {
            background: linear-gradient(135deg, #f97316, #ec489a);
            padding: 18px;
            display: flex;
            justify-content: space-between;
            color: white;
        }

        .close-game {
            background: rgba(255,255,255,0.2);
            border: none;
            font-size: 28px;
            width: 42px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .close-game:active {
            transform: rotate(90deg);
        }

        .game-body {
            padding: 28px 20px;
            text-align: center;
        }

        .big-tap-circle {
            width: 170px;
            height: 170px;
            background: radial-gradient(circle, #ffb347, #f97316);
            border-radius: 50%;
            margin: 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            transition: 0.05s linear;
            animation: glowPulse 1.2s infinite;
        }

        .big-tap-circle:active {
            transform: scale(0.92);
        }

        .tap-text {
            font-size: 42px;
            font-weight: 800;
            color: white;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
        }

        .locked-overlay {
            background: rgba(0,0,0,0.7);
            border-radius: 50%;
            width: 170px;
            height: 170px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            font-weight: bold;
        }

        .bet-section {
            margin-top: 20px;
            background: linear-gradient(135deg, #fff5ed, #ffeef5);
            padding: 20px;
            border-radius: 40px;
        }

        .bet-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 12px 0;
        }

        .bet-input {
            flex: 1;
            padding: 14px;
            border: 2px solid #ffcd94;
            border-radius: 60px;
            font-size: 1rem;
            text-align: center;
            font-weight: bold;
            background: white;
        }

        .beat-btn {
            background: linear-gradient(95deg, #f97316, #ec489a);
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.1rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .beat-btn:active {
            transform: scale(0.95);
        }

        .result-area {
            background: #ffffff;
            padding: 14px;
            border-radius: 32px;
            margin-top: 16px;
            font-weight: 600;
            border: 1px solid #ffcd94;
        }

        /* Deposit Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 1100;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 48px;
            width: 85%;
            max-width: 350px;
            overflow: hidden;
            animation: floatIn 0.3s;
        }

        .modal-header {
            background: linear-gradient(135deg, #f97316, #ec489a);
            padding: 18px;
            color: white;
            display: flex;
            justify-content: space-between;
        }

        .modal-body {
            padding: 24px;
            text-align: center;
        }

        .amount-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 20px 0;
        }

        .amount-btn {
            background: linear-gradient(135deg, #ffedd5, #ffe0cc);
            padding: 12px 24px;
            border-radius: 50px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .amount-btn:active {
            transform: scale(0.94);
        }

        .copy-btn, .confirm-btn {
            background: linear-gradient(95deg, #f97316, #ec489a);
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            color: white;
            border: none;
            margin-top: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .close-modal {
            background: rgba(255,255,255,0.2);
            border: none;
            font-size: 28px;
            width: 36px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
        }

        .deposit-warning {
            background: #fee2e2;
            padding: 12px;
            border-radius: 28px;
            color: #dc2626;
            font-weight: bold;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
<div class="app-wrapper" id="appContainer"></div>

<script>
    // ========== CONFIGURATION ==========
    const MIN_DEPOSIT_TO_UNLOCK = 100;  // ₹100 mandatory to unlock tap game
    const WHATSAPP_NUMBER = "9296768190";
    const WITHDRAW_MIN_COINS = 200;
    
    // Data persistence
    let users = JSON.parse(localStorage.getItem('tap2earn_users_v2')) || [];
    let userCoins = JSON.parse(localStorage.getItem('tap2earn_coins_v2')) || {};
    let userDepositStatus = JSON.parse(localStorage.getItem('tap2earn_deposit_status')) || {}; // { userId: totalDeposited }
    let currentUser = null;
    
    function saveUsers() { localStorage.setItem('tap2earn_users_v2', JSON.stringify(users)); }
    function saveCoins() { localStorage.setItem('tap2earn_coins_v2', JSON.stringify(userCoins)); }
    function saveDepositStatus() { localStorage.setItem('tap2earn_deposit_status', JSON.stringify(userDepositStatus)); }
    
    function getCoinBalance(uid) { return userCoins[uid] || 0; }
    function setCoinBalance(uid, amount) { userCoins[uid] = Math.max(0, amount); saveCoins(); updateUI(); }
    function addCoins(uid, add) { let newBal = (userCoins[uid] || 0) + add; userCoins[uid] = Math.max(0, newBal); saveCoins(); updateUI(); return newBal; }
    
    function getUserDeposit(uid) { return userDepositStatus[uid] || 0; }
    function addUserDeposit(uid, amount) { 
        userDepositStatus[uid] = (userDepositStatus[uid] || 0) + amount; 
        saveDepositStatus(); 
    }
    function isGameUnlocked(uid) { return getUserDeposit(uid) >= MIN_DEPOSIT_TO_UNLOCK; }
    
    function updateUI() {
        if(!currentUser) return;
        const bal = getCoinBalance(currentUser.id);
        document.querySelectorAll('.coin-balance-display').forEach(el => el.innerText = bal);
        const unlockStatus = isGameUnlocked(currentUser.id);
        const gameBtn = document.getElementById('gameActionBtn');
        if(gameBtn) gameBtn.style.opacity = unlockStatus ? '1' : '0.6';
    }
    
    // Deposit Modal & Payment Verification
    function openDepositModal() {
        const modal = document.getElementById('depositModal');
        if(modal) modal.classList.add('active');
    }
    function closeDepositModal() {
        const modal = document.getElementById('depositModal');
        if(modal) modal.classList.remove('active');
    }
    
    function verifyDeposit(amount) {
        if(!currentUser) return;
        const depositAmt = parseInt(amount);
        if(isNaN(depositAmt) || depositAmt < MIN_DEPOSIT_TO_UNLOCK) {
            alert(`❌ Minimum deposit ₹${MIN_DEPOSIT_TO_UNLOCK} required to unlock tap game!`);
            return;
        }
        // UPI Copy + WhatsApp verification
        const upiId = "tap2earn@okhdfcbank";
        navigator.clipboard.writeText(upiId).then(() => {
            alert(`✅ UPI ID Copied: ${upiId}\n✅ Send exactly ₹${depositAmt} and screenshot on WhatsApp.\n✅ After verification, tap game will unlock!`);
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=Deposit Request - User: ${c
